[pytest]
# Tell pytest where to find test files
testpaths = tests

# Only run files that start with "test_"
python_files = test_*.py

# Show more detail in the terminal (-v = verbose, -s = show print statements)
addopts = -v -s

# Register custom markers so pytest does not warn about unknown markers
markers =
    smoke: Quick login check for CI smoke runs
    extension: Tests that require Chrome with the Dakota extension loaded
    auth: Tests that log in to Dakota via the portal
    performance: Dakota extension timing benchmarks (Selenium + Excel report)
    visual: Manual step-by-step login test (use with --keep-open)
